<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purana Denim - Premium Denim Fashion</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
            color: #333;
            overflow-x: hidden;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(184, 134, 11, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(184, 134, 11, 0.6);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        /* ===== HEADER & NAVIGATION ===== */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 2px solid rgba(184, 134, 11, 0.3);
            animation: fadeInDown 0.8s ease;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: #b8860b;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: slideInLeft 0.8s ease;
            transition: all 0.3s ease;
        }

        .logo:hover {
            text-shadow: 0 0 20px rgba(184, 134, 11, 0.8);
            transform: scale(1.05);
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2rem;
            animation: slideInRight 0.8s ease;
        }

        .nav-menu a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #b8860b;
            transition: width 0.3s ease;
        }

        .nav-menu a:hover {
            color: #b8860b;
        }

        .nav-menu a:hover::after {
            width: 100%;
        }

        .cart-icon {
            color: #b8860b;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: slideInRight 0.8s ease 0.2s backwards;
        }

        .cart-icon:hover {
            transform: scale(1.2);
            text-shadow: 0 0 15px rgba(184, 134, 11, 0.8);
        }

        /* ===== HERO SECTION ===== */
        .hero {
            margin-top: 80px;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(184, 134, 11, 0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-content {
            text-align: center;
            z-index: 10;
            max-width: 800px;
            animation: fadeInUp 1s ease;
        }

        .hero-tag {
            font-size: 1.2rem;
            color: #b8860b;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            animation: fadeInUp 1s ease 0.2s backwards;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            font-weight: 900;
            color: #fff;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            animation: fadeInUp 1s ease 0.4s backwards;
            text-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .hero-subtitle {
            font-size: 1.5rem;
            color: #ccc;
            margin-bottom: 2rem;
            font-weight: 300;
            animation: fadeInUp 1s ease 0.6s backwards;
        }

        .cta-button {
            display: inline-block;
            padding: 1rem 3rem;
            background: linear-gradient(135deg, #b8860b 0%, #d4a017 100%);
            color: #000;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 1s ease 0.8s backwards;
            box-shadow: 0 10px 40px rgba(184, 134, 11, 0.3);
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s ease;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(184, 134, 11, 0.5);
        }

        /* ===== FLOATING ELEMENTS ===== */
        .floating-element {
            position: absolute;
            animation: float 3s ease-in-out infinite;
        }

        .float-1 {
            top: 20%;
            right: 10%;
            font-size: 10rem;
            opacity: 0.05;
            animation-delay: 0s;
        }

        .float-2 {
            bottom: 20%;
            left: 10%;
            font-size: 8rem;
            opacity: 0.05;
            animation-delay: 1s;
        }

        /* ===== FEATURES SECTION ===== */
        .features {
            padding: 6rem 3rem;
            background: #fff;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 3rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .feature-card {
            text-align: center;
            padding: 2rem;
            border-radius: 15px;
            background: #f9f9f9;
            transition: all 0.3s ease;
            animation: fadeInUp 1s ease;
            animation-fill-mode: both;
        }

        .feature-card:nth-child(1) {
            animation-delay: 0.2s;
        }

        .feature-card:nth-child(2) {
            animation-delay: 0.4s;
        }

        .feature-card:nth-child(3) {
            animation-delay: 0.6s;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(184, 134, 11, 0.2);
            border: 2px solid #b8860b;
        }

        .feature-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .feature-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #333;
        }

        .feature-card p {
            color: #666;
            line-height: 1.6;
        }

        /* ===== PRODUCTS SECTION ===== */
        .products-section {
            padding: 6rem 3rem;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #fff;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            text-align: center;
            margin-bottom: 1rem;
            color: #b8860b;
            animation: fadeInDown 0.8s ease;
        }

        .section-subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 4rem;
            font-size: 1.2rem;
            animation: fadeInUp 0.8s ease 0.2s backwards;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(184, 134, 11, 0.3);
            animation: fadeInUp 0.8s ease;
            animation-fill-mode: both;
        }

        .product-card:nth-child(1) {
            animation-delay: 0.2s;
        }

        .product-card:nth-child(2) {
            animation-delay: 0.4s;
        }

        .product-card:nth-child(3) {
            animation-delay: 0.6s;
        }

        .product-card:nth-child(4) {
            animation-delay: 0.8s;
        }

        .product-card:hover {
            transform: translateY(-15px);
            border-color: #b8860b;
            box-shadow: 0 20px 60px rgba(184, 134, 11, 0.4);
        }

        .product-image {
            width: 100%;
            height: 350px;
            background: linear-gradient(135deg, #2a2a2a 0%, #3a3a3a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            overflow: hidden;
            position: relative;
        }

        .product-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(184, 134, 11, 0.1) 100%);
        }

        .product-info {
            padding: 2rem;
        }

        .product-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #b8860b;
        }

        .product-desc {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 1.5rem;
        }

        .add-to-cart {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #b8860b 0%, #d4a017 100%);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .add-to-cart:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(184, 134, 11, 0.4);
        }

        /* ===== COLLECTION SECTION ===== */
        .collection-section {
            padding: 6rem 3rem;
            background: #fff;
            max-width: 1400px;
            margin: 0 auto;
        }

        .collection-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
            margin-top: 3rem;
        }

        .collection-image {
            height: 500px;
            background: linear-gradient(135deg, #b8860b 0%, #d4a017 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8rem;
            animation: slideInLeft 0.8s ease;
            box-shadow: 0 20px 60px rgba(184, 134, 11, 0.2);
        }

        .collection-content {
            animation: slideInRight 0.8s ease;
        }

        .collection-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #333;
        }

        .collection-content p {
            font-size: 1.1rem;
            color: #666;
            line-height: 1.8;
            margin-bottom: 2rem;
        }
